<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Class 2 Math Practice Worksheet Generator</title>
<style>
  :root{
    --black:#000;
    --white:#fff;
    --gray:#555;
    --line:#000;
    --accent:#1a56db;
    --accent-light:#e8f0fe;
  }
  *{box-sizing:border-box;}
  body{
    font-family:Arial, Helvetica, sans-serif;
    background:#e9e9e9;
    color:#000;
    margin:0;
    padding:0;
  }
  .toolbar{
    background:#fff;
    border-bottom:2px solid #000;
    padding:14px 18px;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:14px;
    position:sticky;
    top:0;
    z-index:50;
  }
  .toolbar h1{font-size:18px;margin:0;margin-right:10px;letter-spacing:0.5px;}
  .toolbar label{font-size:14px;}
  .toolbar input[type=number]{
    width:64px;padding:5px 6px;border:1px solid #000;
    font-family:inherit;font-size:14px;
  }
  .btn{
    background:#fff;border:1.5px solid #000;color:#000;
    padding:7px 16px;font-size:14px;font-family:inherit;
    cursor:pointer;border-radius:3px;white-space:nowrap;
  }
  .btn:hover{background:#000;color:#fff;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .btn:disabled:hover{background:#fff;color:#000;}
  .btn.accent{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn.accent:hover{background:#1240a8;border-color:#1240a8;}
  .btn.green{background:#166534;color:#fff;border-color:#166534;}
  .btn.green:hover{background:#14532d;}
  #exportProgress{font-size:12.5px;color:#000;min-width:160px;}
  .tabbar{
    background:#f3f3f3;border-bottom:2px solid #000;
    padding:8px 10px 0 10px;display:flex;flex-wrap:wrap;gap:4px;
    position:sticky;top:64px;z-index:49;max-height:120px;overflow-y:auto;
  }
  .tabbtn{
    background:#ddd;border:1px solid #000;border-bottom:none;
    padding:6px 14px;font-size:13px;font-family:inherit;
    cursor:pointer;border-radius:4px 4px 0 0;
  }
  .tabbtn.active{background:#fff;font-weight:bold;}
  #setsContainer{padding:20px;display:flex;justify-content:center;}
  .worksheet{display:none;}
  .worksheet.active{display:block;}
  .page{
    background:#fff;width:210mm;min-height:296mm;
    padding:14mm 14mm;border:1px solid #999;
    box-shadow:0 0 10px rgba(0,0,0,0.15);
  }
  .ws-header{text-align:center;border-bottom:3px solid #000;padding-bottom:8px;margin-bottom:10px;}
  .ws-title{font-size:20px;font-weight:bold;letter-spacing:0.5px;}
  .ws-sub{font-size:15px;margin-top:2px;font-weight:bold;}
  .ws-fields{
    display:flex;justify-content:space-between;font-size:13px;
    margin-top:10px;flex-wrap:wrap;gap:6px;
  }
  .ws-fields span{border-bottom:1px solid #000;padding:0 4px 2px 4px;min-width:120px;display:inline-block;}
  .section{margin:16px 0 22px 0;}
  .section h2{
    font-size:14.5px;background:#000;color:#fff;
    padding:4px 8px;margin:0 0 8px 0;display:inline-block;
  }
  .section .instr{font-size:12.5px;color:#000;font-style:italic;margin:0 0 6px 0;}
  .seqline{font-size:15px;margin:6px 0;letter-spacing:1px;font-family:Arial,sans-serif;}
  .seqline .qn{font-weight:bold;margin-right:6px;}
  table.wstable{width:100%;border-collapse:collapse;margin:6px 0;}
  table.wstable td,table.wstable th{
    border:1.4px solid #000;padding:6px 8px;
    vertical-align:middle;font-size:13px;
  }
  table.wstable td.rownum{width:26px;text-align:center;font-weight:bold;}
  .objcell{display:flex;flex-wrap:wrap;gap:3px;align-items:center;}
  .icon-wrap{position:relative;display:inline-block;line-height:0;}
  .crossout{position:absolute;top:0;left:0;}
  .ansbox{display:inline-block;border:2px solid #000;width:46px;height:36px;vertical-align:middle;}
  .ansbox.small{width:34px;height:30px;}
  .dashedbox{display:inline-block;border:2px dashed #000;width:42px;height:42px;vertical-align:middle;}
  .opsym{font-size:20px;font-weight:bold;margin:0 6px;}
  .eqcell{display:flex;align-items:center;flex-wrap:wrap;gap:2px;}
  .compcell{display:flex;align-items:center;gap:10px;}
  .compbox{display:inline-block;border:2px solid #000;width:34px;height:34px;}
  .blankline{display:inline-block;border-bottom:1.4px solid #000;width:50px;margin:0 4px;}
  .matchwrap{display:flex;justify-content:space-between;gap:30px;}
  .matchcol{flex:1;}
  .matchitem{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:14px 0;font-size:13px;width:100%;}
  .matchitem .micontent{display:flex;align-items:center;gap:8px;}
  .matchitem .dot{width:10px;height:10px;border:1.4px solid #000;border-radius:50%;background:#fff;flex-shrink:0;}
  .objline{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;}
  .objitem{display:flex;flex-direction:column;align-items:center;font-size:11.5px;gap:2px;}
  .sizebox-row{display:flex;gap:18px;align-items:flex-end;}
  .sizebox{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .numbox{width:30px;height:26px;border:2px solid #000;}
  .compare-row{display:flex;align-items:flex-end;gap:24px;justify-content:center;}
  .compare-cell{border:1.4px solid #000;padding:8px 14px;display:flex;align-items:flex-end;justify-content:center;min-width:90px;min-height:90px;}
  .ws-footer{margin-top:18px;border-top:1.4px solid #000;padding-top:6px;font-size:11px;text-align:center;color:#333;}

  /* ===== ANSWER KEY STYLES ===== */
  .ak-page{
    background:#fff;width:210mm;padding:14mm 14mm;
    border:1px solid #999;box-shadow:0 0 10px rgba(0,0,0,0.15);
    font-family:Arial,sans-serif;
  }
  .ak-header{
    text-align:center;border-bottom:3px solid #000;
    padding-bottom:8px;margin-bottom:14px;
  }
  .ak-title{font-size:18px;font-weight:bold;letter-spacing:1px;}
  .ak-sub{font-size:14px;margin-top:4px;color:#333;}
  .ak-section{margin:14px 0;}
  .ak-section h3{
    font-size:13px;font-weight:bold;background:#222;color:#fff;
    padding:3px 8px;margin:0 0 6px 0;display:inline-block;
  }
  table.aktable{width:100%;border-collapse:collapse;font-size:12px;margin:4px 0;}
  table.aktable td,table.aktable th{
    border:1px solid #666;padding:4px 6px;vertical-align:top;
  }
  table.aktable th{background:#f0f0f0;font-weight:bold;text-align:left;}
  .ak-ans{
    background:#fffde7;border:1.5px solid #f9a825;
    padding:2px 6px;border-radius:3px;font-weight:bold;
    display:inline-block;margin:1px 2px;
  }
  .ak-footer{margin-top:14px;border-top:1px solid #ccc;padding-top:6px;font-size:10px;text-align:center;color:#555;}

  @media print{
    body{background:#fff;}
    .no-print{display:none !important;}
    #setsContainer{padding:0;display:block;}
    .page,.ak-page{box-shadow:none;border:none;width:auto;min-height:0;padding:8mm 10mm;}
    .worksheet{display:none;}
    .worksheet.active{display:block;}
  }
  @page{size:A4;margin:8mm;}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<div class="toolbar no-print">
  <h1>Class 2 — Math Worksheet Generator (FLN)</h1>
  <label>Number of sets:
    <input type="number" id="setCount" min="1" max="100" value="5">
  </label>
  <button class="btn" id="generateBtn">Generate</button>
  <button class="btn" id="printBtn">Print current set</button>
  <button class="btn accent" id="viewAKBtn">View Answer Key</button>
  <button class="btn green" id="dlAKBtn">⬇ Download Answer Key (current set)</button>
  <button class="btn" id="exportAllBtn">⬇ Download All Sets + Answer Keys (ZIP)</button>
  <span id="exportProgress" class="no-print"></span>
  <span style="font-size:12px;color:#555;">All worksheets are black &amp; white, ready to print on A4.</span>
</div>

<div class="tabbar no-print" id="tabbar"></div>
<div id="setsContainer"></div>
<div id="pdfRenderRoot" style="position:fixed;left:-99999px;top:0;width:210mm;background:#fff;"></div>

<!-- Answer Key Modal -->
<div id="akModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:200;overflow:auto;">
  <div style="background:#fff;max-width:900px;margin:30px auto;border-radius:6px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.3);">
    <div style="background:#000;color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;" class="no-print">
      <span style="font-size:16px;font-weight:bold;">Answer Key Preview</span>
      <button onclick="closeAKModal()" style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer;">✕</button>
    </div>
    <div id="akModalContent" style="padding:20px;"></div>
  </div>
</div>

<script>
/* ============================================================
   UTILITIES
   ============================================================ */
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function sample(arr,n){ return shuffle(arr).slice(0,n); }
function pick(arr){ return arr[randInt(0,arr.length-1)]; }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
let uidCounter=1;
function nextUid(){ return uidCounter++; }

/* ============================================================
   SVG ICON LIBRARY
   ============================================================ */
function svgWrap(inner,size){
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">'+inner+'</svg>';
}
function starPoints(cx,cy,outerR,innerR,n){
  const pts=[];
  for(let i=0;i<n*2;i++){
    const r=i%2===0?outerR:innerR;
    const angle=(Math.PI/n)*i-Math.PI/2;
    pts.push((cx+r*Math.cos(angle)).toFixed(1)+','+(cy+r*Math.sin(angle)).toFixed(1));
  }
  return pts.join(' ');
}

function renderIcon(name,size,opts){ return ICONS[name](size,opts); }
function iconWithCross(name,size,crossed){
  const ic=renderIcon(name,size);
  if(!crossed) return '<span class="icon-wrap">'+ic+'</span>';
  return '<span class="icon-wrap">'+ic+'<svg class="crossout" width="'+size+'" height="'+size+'" viewBox="0 0 100 100"><line x1="6" y1="6" x2="94" y2="94" stroke="#000" stroke-width="9"/><line x1="94" y1="6" x2="6" y2="94" stroke="#000" stroke-width="9"/></svg></span>';
}

/* ============================================================
   DATA POOLS
   ============================================================ */
const COUNT_ICONS=['apple','star','flower','butterfly','leaf','fish','pencil','balloon','pumpkin'];

const SIZE_PLURAL={pencil:'pencils',candle:'candles',tree:'trees',fish:'fish',leaf:'leaves',pumpkin:'pumpkins'};
const SIZE_ORIENT={pencil:'horizontal',candle:'vertical',tree:'vertical',fish:'horizontal',leaf:'horizontal',pumpkin:'vertical'};

/* ============================================================
   SECTION BUILDERS — each returns { html, answers }
   ============================================================ */
function section1(){
  const ranges=[[1,10],[11,20],[21,30],[31,40],[41,50]];
  let out='';
  const answers=[];
  ranges.forEach((r,idx)=>{
    const nums=[]; for(let n=r[0];n<=r[1];n++) nums.push(n);
    const blankPositions=sample([...Array(nums.length).keys()],3);
    const display=nums.map((n,i)=>blankPositions.includes(i)?'____':n).join('&nbsp;&nbsp;');
    const blanks=blankPositions.sort((a,b)=>a-b).map(p=>({position:p+1,value:nums[p]}));
    answers.push({question:idx+1,range:r[0]+'-'+r[1],blanks});
    out+='<div class="seqline"><span class="qn">'+(idx+1)+'.</span>'+display+'</div>';
  });
  return {html:out, answers:{section:'Fill in Missing Numbers', items:answers}};
}

function section2(){
  const icons=sample(COUNT_ICONS,5);
  let rows='';
  const answers=[];
  icons.forEach((icon,i)=>{
    const count=randInt(3,15);
    let imgs=''; for(let k=0;k<count;k++) imgs+=renderIcon(icon,26);
    rows+='<tr><td class="rownum">'+(i+1)+'</td><td><div class="objcell">'+imgs+'</div></td><td style="width:60px;text-align:center;"><span class="ansbox"></span></td></tr>';
    answers.push({question:i+1,object:icon,count});
  });
  return {
    html:'<table class="wstable"><tr><th style="width:26px;">#</th><th>Count the objects</th><th style="width:60px;">Write the number</th></tr>'+rows+'</table>',
    answers:{section:'Count Objects', items:answers}
  };
}

function section3(){
  let out='';
  const answers=[];
  const A=randInt(2,49);
  out+='<div class="seqline"><span class="qn">1.</span> ____ , '+A+' &nbsp;(before)</div>';
  answers.push({question:1,type:'before',given:A,answer:A-1});
  const B=randInt(1,49);
  out+='<div class="seqline"><span class="qn">2.</span> '+B+' , ____ &nbsp;(after)</div>';
  answers.push({question:2,type:'after',given:B,answer:B+1});
  const C=randInt(1,48);
  out+='<div class="seqline"><span class="qn">3.</span> '+C+' , ____ , '+(C+2)+' &nbsp;(between)</div>';
  answers.push({question:3,type:'between',given:[C,C+2],answer:C+1});
  const D=randInt(2,48);
  out+='<div class="seqline"><span class="qn">4.</span> ____ , '+D+' , '+(D+1)+' &nbsp;(before)</div>';
  answers.push({question:4,type:'before',given:[D,D+1],answer:D-1});
  const E=randInt(1,47);
  out+='<div class="seqline"><span class="qn">5.</span> '+E+' , '+(E+1)+' , ____ &nbsp;(after)</div>';
  answers.push({question:5,type:'after',given:[E,E+1],answer:E+2});
  return {html:out, answers:{section:'Before After Between', items:answers}};
}

function section4(){
  const syms=shuffle(['<','>','=','<','>']);
  let out='';
  const answers=[];
  syms.forEach((sym,i)=>{
    let left,right;
    if(sym==='='){ left=randInt(1,50); right=left; }
    else if(sym==='<'){ left=randInt(1,48); right=randInt(left+1,50); }
    else { left=randInt(2,50); right=randInt(1,left-1); }
    out+='<div class="seqline"><span class="qn">'+(i+1)+'.</span> '+left+' <span class="compbox" style="vertical-align:middle;"></span> '+right+'</div>';
    answers.push({question:i+1,left,right,answer:sym});
  });
  return {html:out, answers:{section:'Compare Numbers', items:answers}};
}

function section5(){
  const objs=sample(SIZE_OBJECTS,5);
  let rows='';
  const answers=[];
  objs.forEach((obj,i)=>{
    const orient=SIZE_ORIENT[obj];
    const word=orient==='vertical'?'tallest':'longest';
    const instr='Arrange the 4 '+SIZE_PLURAL[obj]+' from shortest to '+word+'.';
    const scales=shuffle([0.5,0.68,0.84,1.0]);
    const scaledOrder=scales.map((s,idx)=>({displayPos:idx,scale:s}));
    // rank: position 0 in display gets rank based on its scale (1=smallest, 4=largest)
    const sorted=[...scaledOrder].sort((a,b)=>a.scale-b.scale);
    const rankMap={};
    sorted.forEach((item,rank)=>{ rankMap[item.displayPos]=rank+1; });
    let cells='';
    scales.forEach((s,idx)=>{
      const sz=Math.round(70*s);
      cells+='<div class="sizebox"><div style="height:74px;display:flex;align-items:flex-end;">'+renderIcon(obj,sz)+'</div><span class="numbox"></span></div>';
    });
    rows+='<tr><td class="rownum">'+(i+1)+'</td><td>'+instr+'</td><td><div class="sizebox-row">'+cells+'</div></td></tr>';
    answers.push({
      question:i+1,object:obj,
      note:'Boxes left→right. Write 1=shortest, 4='+word+'.',
      ranking:scales.map((s,pos)=>({displayPosition:pos+1,scale:s.toFixed(2),correctRank:rankMap[pos]}))
    });
  });
  return {
    html:'<table class="wstable"><tr><th style="width:26px;">#</th><th style="width:30%;">Instruction</th><th>Arrange and number 1–4</th></tr>'+rows+'</table>',
    answers:{section:'Size Ordering', items:answers}
  };
}

function section6(){
  const icons=sample(COUNT_ICONS,5);
  let rows='';
  const answers=[];
  icons.forEach((icon,i)=>{
    const a=randInt(1,9),b=randInt(1,9);
    let imgsA=''; for(let k=0;k<a;k++) imgsA+=renderIcon(icon,22);
    let imgsB=''; for(let k=0;k<b;k++) imgsB+=renderIcon(icon,22);
    rows+='<tr><td class="rownum">'+(i+1)+'</td><td><div class="eqcell"><div class="objcell">'+imgsA+'</div><span class="opsym">+</span><div class="objcell">'+imgsB+'</div><span class="opsym">=</span><span class="ansbox"></span></div></td></tr>';
    answers.push({question:i+1,object:icon,addend1:a,addend2:b,answer:a+b,expression:a+' + '+b+' = '+(a+b)});
  });
  return {
    html:'<table class="wstable"><tr><th style="width:26px;">#</th><th>Add and write the answer</th></tr>'+rows+'</table>',

  };
}

function section7(){
  const icons=sample(COUNT_ICONS,5);
  let rows='';
  const answers=[];
  icons.forEach((icon,i)=>{
    const total=randInt(5,9);
    const crossCount=randInt(1,total-1);
    const positions=new Set(sample([...Array(total).keys()],crossCount));
    let imgs='';
    for(let k=0;k<total;k++) imgs+=iconWithCross(icon,24,positions.has(k));
    rows+='<tr><td class="rownum">'+(i+1)+'</td><td><div class="eqcell"><div class="objcell">'+imgs+'</div><span class="opsym">=</span><span class="ansbox"></span></div></td></tr>';
    answers.push({question:i+1,object:icon,total,crossedOut:crossCount,remaining:total-crossCount,expression:total+' - '+crossCount+' = '+(total-crossCount)});
  });
  return {
    html:'<p class="instr">Count all the objects, cross out the ones being subtracted, then write how many are left.</p><table class="wstable"><tr><th style="width:26px;">#</th><th>Subtract and write the answer</th></tr>'+rows+'</table>',
    answers:{section:'Subtraction', items:answers}
  };
}

function tensOnesBlocks(number){
  const tens=Math.floor(number/10);
  const ones=number%10;
  let imgs='';
  for(let t=0;t<tens;t++) imgs+=renderIcon('rod',34);
  for(let o=0;o<ones;o++) imgs+=renderIcon('unit',22);
  return imgs;
}
function section8(){
  let rows='';
  const answers=[];
  for(let i=0;i<5;i++){
    const number=randInt(11,99);
    const reveal=i<3;
    const instr=reveal?'Show the number <b>'+number+'</b> using tens and ones.':'Look at the blocks. Write the number.';
    const blocks=tensOnesBlocks(number);
    const answer='Tens: <span class="blankline"></span>&nbsp;&nbsp;Ones: <span class="blankline"></span>&nbsp;&nbsp;Number: <span class="blankline" style="width:64px;"></span>';
    rows+='<tr><td class="rownum">'+(i+1)+'</td><td style="width:24%;">'+instr+'</td><td><div class="objcell">'+blocks+'</div></td><td style="width:30%;font-size:12px;">'+answer+'</td></tr>';
    answers.push({question:i+1,number,tens:Math.floor(number/10),ones:number%10});
  }
  return {
    html:'<table class="wstable"><tr><th style="width:26px;">#</th><th>Instruction</th><th>Tens and Ones blocks</th><th>Answer</th></tr>'+rows+'</table>',
    answers:{section:'Tens and Ones', items:answers}
  };
}

function section9(){
  const left=shuffle(MATCH_SHAPES);
  const rightItems=MATCH_SHAPES.map(([shapeKey])=>pick(MATCH_POOLS[shapeKey]));
  const right=shuffle(rightItems);
  let leftHtml='',rightHtml='';
  const matchPairs=[];
  // Build mapping: shapeKey → chosen object
  const shapeToObj={};
  MATCH_SHAPES.forEach(([shapeKey],idx)=>{ shapeToObj[shapeKey]=rightItems[idx]; });
  left.forEach(([key,label])=>{
    leftHtml+='<div class="matchitem"><div class="micontent">'+renderIcon(key,40)+'<span>'+label+'</span></div><span class="dot"></span></div>';
    matchPairs.push({shape:label,shapeKey:key,matchesTo:shapeToObj[key][1],matchKey:shapeToObj[key][0]});
  });
  right.forEach(([key,label])=>{
    rightHtml+='<div class="matchitem"><span class="dot"></span><div class="micontent">'+renderIcon(key,40)+'<span>'+label+'</span></div></div>';
  });
  return {
    html:'<p class="instr">Draw a line from each shape on the left to a matching real-life object on the right.</p><div class="matchwrap"><div class="matchcol">'+leftHtml+'</div><div class="matchcol">'+rightHtml+'</div></div>',
    answers:{section:'Match Shapes', items:matchPairs, note:'Left column order shown; connect each shape to its object'}
  };
}

function buildPatternRow(){
  const types=['AB','AAB','ABB','ABC'];
  const type=pick(types);
  const lettersUsed=Array.from(new Set(type.split('')));
  const shapesChosen=sample(PATTERN_SHAPES,lettersUsed.length);
  const letterToShape={};
  lettersUsed.forEach((L,i)=>letterToShape[L]=shapesChosen[i]);
  const seq=[]; let li=0;
  while(seq.length<6){ seq.push(letterToShape[type[li%type.length]]); li++; }
  const names=shapesChosen.map(cap);
  let namesStr;
  if(names.length===2) namesStr=names[0]+' and '+names[1];
  else namesStr=names.slice(0,-1).join(', ')+' and '+names[names.length-1];
  const label='Continue the '+type+' pattern using '+namesStr+'.';
  // next 2 items
  const next1=letterToShape[type[li%type.length]];
  li++;
  const next2=letterToShape[type[li%type.length]];
  return {seq,label,type,next1:cap(next1),next2:cap(next2)};
}

function section10(){
  let rows='';
  const answers=[];
  for(let i=0;i<3;i++){
    const {seq,label,type,next1,next2}=buildPatternRow();
    const shapesHtml=seq.map(s=>renderIcon(s,34)).join('');
    const blanksHtml='<span class="dashedbox"></span><span class="dashedbox"></span>';
    rows+='<tr><td class="rownum">'+(i+1)+'</td><td style="width:30%;">'+label+'</td><td><div class="objcell">'+shapesHtml+blanksHtml+'</div></td></tr>';
    answers.push({question:i+1,type:'pattern',patternType:type,given:seq.map(cap),answer:[next1,next2]});
  }
  for(let i=3;i<5;i++){
    const cat=pick(['vehicle','flower']);
    const pool=cat==='vehicle'?VEHICLES:FLOWERS_NAMED;
    const items=shuffle(pool);
    let line='';
    items.forEach(([key,label])=>{
      line+='<div class="objitem">'+renderIcon(key,38)+'<span>'+label+'</span></div>';
    });
    let question;
    const thirdItem=items[2][1];
    const fourthItem=items[3][1];
    if(i===3){
      question='Which '+(cat==='vehicle'?'vehicle':'flower')+' is in the 3rd position? <span class="ansbox small"></span> &nbsp;<span style="font-size:11px;color:#555;">(answer: write its name)</span>';
      answers.push({question:i+1,type:'position',category:cat,order:items.map(x=>x[1]),ask:'3rd position',answer:thirdItem});
    } else {
      question='Circle the '+(cat==='vehicle'?'vehicle':'flower')+' in the 4th position.';
      answers.push({question:i+1,type:'position',category:cat,order:items.map(x=>x[1]),ask:'4th position',answer:fourthItem});
    }
    rows+='<tr><td class="rownum">'+(i+1)+'</td><td colspan="2"><div class="objline">'+line+'</div><div style="margin-top:8px;font-size:13px;">'+question+'</div></td></tr>';
  }
  return {
    html:'<table class="wstable"><tr><th style="width:26px;">#</th><th colspan="2">Pattern / Position</th></tr>'+rows+'</table>',
    answers:{section:'Patterns and Position', items:answers}
  };
}

const COMPARE_PHRASES={
  giraffe:{adjBig:'taller',adjSmall:'shorter',noun:'giraffe'},
  candle:{adjBig:'taller',adjSmall:'shorter',noun:'candle'},
  balloon:{adjBig:'bigger',adjSmall:'smaller',noun:'balloon'},
  pumpkin:{adjBig:'bigger',adjSmall:'smaller',noun:'pumpkin'},
  apple:{adjBig:'bigger',adjSmall:'smaller',noun:'apple'},
  tree:{adjBig:'taller',adjSmall:'shorter',noun:'tree'},
  pencil:{adjBig:'longer',adjSmall:'shorter',noun:'pencil'},
  glassWater:{adjBig:'with more water',adjSmall:'with less water',noun:'glass'}
};
function section11(){
  const objs=sample(COMPARE_OBJECTS,5);
  let rows='';
  const answers=[];
  objs.forEach((obj,i)=>{
    const cfg=COMPARE_PHRASES[obj];
    const askBig=Math.random()<0.5;
    const adj=askBig?cfg.adjBig:cfg.adjSmall;
    const instr=obj==='glassWater'?('Circle the glass '+adj+'.'):('Circle the '+adj+' '+cfg.noun+'.');
    let iconA,iconB;
    let levelA,levelB,scaleA,scaleB;
    if(obj==='glassWater'){
      const levels=shuffle([0.25,0.85]);
      levelA=levels[0]; levelB=levels[1];
      iconA=renderIcon(obj,72,{level:levelA});
      iconB=renderIcon(obj,72,{level:levelB});
    } else {
      const scales=shuffle([0.55,1.0]);
      scaleA=scales[0]; scaleB=scales[1];
      iconA=renderIcon(obj,Math.round(70*scaleA));
      iconB=renderIcon(obj,Math.round(70*scaleB));
    }
    const order=shuffle([{icon:iconA,id:'A',scale:scaleA,level:levelA},{icon:iconB,id:'B',scale:scaleB,level:levelB}]);
    const displayed=[order[0],order[1]];
    let correctCircle;
    if(obj==='glassWater'){
      correctCircle=askBig
        ? (displayed[0].level>displayed[1].level?'Left':'Right')
        : (displayed[0].level<displayed[1].level?'Left':'Right');
    } else {
      correctCircle=askBig
        ? (displayed[0].scale>displayed[1].scale?'Left':'Right')
        : (displayed[0].scale<displayed[1].scale?'Left':'Right');
    }
    rows+='<tr><td class="rownum">'+(i+1)+'</td><td style="width:30%;">'+instr+'</td><td><div class="compare-row"><div class="compare-cell">'+displayed[0].icon+'</div><div class="compare-cell">'+displayed[1].icon+'</div></div></td></tr>';
    answers.push({question:i+1,object:obj,instruction:instr,answer:correctCircle,note:'Left or Right box to circle'});
  });
  return {
    html:'<table class="wstable"><tr><th style="width:26px;">#</th><th>Instruction</th><th>Compare</th></tr>'+rows+'</table>',
    answers:{section:'Compare Objects', items:answers}
  };
}

const SECTION_TITLES=[
  'Section 1 — Fill in the Missing Numbers',
  'Section 2 — Count the Objects and Write the Numeral',
  'Section 3 — Before, After, Between',
  'Section 4 — Compare the Numbers ( &lt; , &gt; , = )',
  'Section 5 — Size Ordering',
  'Section 6 — Addition',
  'Section 7 — Subtraction',
  'Section 8 — Tens and Ones',
  'Section 9 — Match the Shapes',
  'Section 10 — Complete the Pattern',
  'Section 11 — Compare the Objects'
];

function buildWorksheetAndKey(setNum){
  const builders=[section1,section2,section3,section4,section5,section6,section7,section8,section9,section10,section11];
  let sectionsHtml='';
  const answerKey={
    set:setNum,
    generated:new Date().toISOString(),
    totalSections:11,
    sections:[]
  };
  builders.forEach((fn,idx)=>{
    const result=fn();
    sectionsHtml+='<div class="section"><h2>'+SECTION_TITLES[idx]+'</h2>'+result.html+'</div>';
    answerKey.sections.push(result.answers);
  });
  const worksheetHtml='<div class="page">'+
    '<div class="ws-header">'+
      '<div class="ws-title">CLASS 2 — MATHEMATICS PRACTICE WORKSHEET</div>'+
      '<div class="ws-sub">Set '+setNum+'</div>'+
      '<div class="ws-fields"><span>Name:</span><span>Date:</span><span>Roll No.:</span><span>Marks: ____ / 100</span></div>'+
    '</div>'+sectionsHtml+
    '<div class="ws-footer">Class 2 — Math FLN Practice &nbsp;|&nbsp; Set '+setNum+'</div>'+
  '</div>';
  return {worksheetHtml, answerKey};
}

  html+=`<div class="ak-footer">Class 2 Math FLN — Answer Key Set ${ak.set} | Auto-generated | For evaluator use only</div></div>`;

let worksheetHTMLs=[];
let answerKeys=[];
let inserted=[];
let currentSet=1;

function generateSets(n){
  n=Math.max(1,Math.min(100,n|0));
  worksheetHTMLs=[];
  answerKeys=[];
  for(let i=0;i<n;i++){
    const {worksheetHtml,answerKey}=buildWorksheetAndKey(i+1);
    worksheetHTMLs.push(worksheetHtml);
    answerKeys.push(answerKey);
  }
  inserted=new Array(n).fill(false);

  const tabbar=document.getElementById('tabbar');
  tabbar.innerHTML='';
  for(let i=1;i<=n;i++){
    const btn=document.createElement('button');
    btn.className='tabbtn';
    btn.id='tabbtn-'+i;
    btn.textContent='Set '+i;
    btn.addEventListener('click',()=>activateSet(i));
    tabbar.appendChild(btn);
  }
  const container=document.getElementById('setsContainer');
  container.innerHTML='';
  for(let i=1;i<=n;i++){
    const div=document.createElement('div');
    div.className='worksheet';
    div.id='ws-'+i;
    container.appendChild(div);
  }
  activateSet(1);
}

function activateSet(num){
  currentSet=num;
  document.querySelectorAll('.worksheet').forEach(w=>w.classList.remove('active'));
  document.querySelectorAll('.tabbtn').forEach(b=>b.classList.remove('active'));
  const div=document.getElementById('ws-'+num);
  if(!div) return;
  if(!inserted[num-1]){
    div.innerHTML=worksheetHTMLs[num-1];
    inserted[num-1]=true;
  }
  div.classList.add('active');
  const btn=document.getElementById('tabbtn-'+num);
  if(btn) btn.classList.add('active');
}

/* ============================================================
   PDF EXPORT HELPERS
   ============================================================ */
function computePdfSlices(imgWidthPx,imgHeightPx,pageWidthMM,pageHeightMM){
  const pxPerMM=imgWidthPx/pageWidthMM;
  const pageHeightPx=Math.max(1,Math.round(pageHeightMM*pxPerMM));
  const slices=[];
  let y=0;
  while(y<imgHeightPx){
    const h=Math.min(pageHeightPx,imgHeightPx-y);
    slices.push({sy:y,sh:h,mmHeight:h/pxPerMM});
    y+=h;
  }
  return slices;
}
function sliceCanvas(srcCanvas,sy,sh){
  const c=document.createElement('canvas');
  c.width=srcCanvas.width; c.height=sh;
  c.getContext('2d').drawImage(srcCanvas,0,sy,srcCanvas.width,sh,0,0,srcCanvas.width,sh);
  return c;
}
async function buildPdfBlobForSet(setIndex){
  const renderRoot=document.getElementById('pdfRenderRoot');
  renderRoot.innerHTML=worksheetHTMLs[setIndex-1];
  await new Promise(r=>requestAnimationFrame(r));
  await new Promise(r=>requestAnimationFrame(r));
  await new Promise(r=>setTimeout(r,80));
  const pageEl=renderRoot.querySelector('.page');
  const canvas=await html2canvas(pageEl,{scale:1.5,backgroundColor:'#ffffff'});
  const pdf=new window.jspdf.jsPDF({unit:'mm',format:'a4'});
  const slices=computePdfSlices(canvas.width,canvas.height,210,297);
  slices.forEach((slice,idx)=>{
    const sc=sliceCanvas(canvas,slice.sy,slice.sh);
    const imgData=sc.toDataURL('image/jpeg',0.85);
    if(idx>0) pdf.addPage();
    pdf.addImage(imgData,'JPEG',0,0,210,slice.mmHeight);
    sc.width=0; sc.height=0;
  });
  canvas.width=0; canvas.height=0;
  renderRoot.innerHTML='';
  return pdf.output('blob');
}
